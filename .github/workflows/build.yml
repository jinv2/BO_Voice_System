name: Build and Release BO Matrix

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: BO_Matrix_Windows
            executable_path: dist/BO_Matrix
          - os: macos-latest
            artifact_name: BO_Matrix_Mac
            executable_path: dist/BO_Matrix
          - os: ubuntu-latest
            artifact_name: BO_Matrix_Linux
            executable_path: dist/BO_Matrix

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller Pillow pyperclip

      - name: Build with PyInstaller
        shell: bash
        run: |
          SEP=":"
          if [ "${{ matrix.os }}" == "windows-latest" ]; then SEP=";"; fi
          pyinstaller --noconfirm --onedir --windowed --add-data "assets${SEP}assets" --name "BO_Matrix" src/bo_ui.py

      - name: Package artifacts
        shell: bash
        run: |
          cp DOCS_BO_FEATURES.md dist/BO_Matrix/
          cp INSTALLATION_GUIDE.md dist/BO_Matrix/
          cd dist
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            7z a ../${{ matrix.artifact_name }}.zip BO_Matrix/
          else
            zip -r ../${{ matrix.artifact_name }}.zip BO_Matrix/
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BO_Matrix_Windows/BO_Matrix_Windows.zip
            BO_Matrix_Mac/BO_Matrix_Mac.zip
            BO_Matrix_Linux/BO_Matrix_Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
